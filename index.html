<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DesertLeap | AI Visibility</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {font-family:Inter;margin:0;background:#f9fafb;text-align:center;}
.container {max-width:900px;margin:auto;padding:80px 20px;}
h1 {font-size:2.8rem;font-weight:800;}
p {color:#666;}
.btn {padding:14px 30px;background:#0FA891;color:#fff;border-radius:30px;border:none;cursor:pointer;margin-top:10px;}
.card {background:#fff;padding:30px;border-radius:12px;margin-top:30px;}
#chatBox {height:300px;overflow:auto;text-align:left;margin-bottom:10px;}
</style>
</head>

<body>

<div class="container">
<h1>Check Your AI Visibility</h1>
<p>Ask a question or start below.</p>

<div class="card">
<div id="chatBox"></div>

<input id="input" placeholder="Type here..." style="width:70%;padding:10px;">
<button class="btn" onclick="send()">Send</button>

<div id="booking" style="display:none;margin-top:20px;">
<iframe src="https://calendly.com/YOUR-LINK" width="100%" height="500"></iframe>
</div>
</div>
</div>

<script>
let lead = {
  messages:[],
  score:"yellow",
  source:"ai_chat"
};

async function send(){
  const input = document.getElementById("input");
  const msg = input.value;

  append("You", msg);
  lead.messages.push(msg);
  input.value="";

  // Email capture
  if(msg.includes("@") && !lead.email){
    lead.email = msg;
    append("AI", "Got it. I’ll send your results there.");
  }

  // Basic capture
  if(!lead.business){
    lead.business = msg;
  } else if(!lead.urgency){
    lead.urgency = msg;
  }

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg,lead})
  });

  const data = await res.json();

  append("AI", data.reply);

  scoreLead();

  if(
    msg.toLowerCase().includes("yes") ||
    msg.toLowerCase().includes("check") ||
    msg.toLowerCase().includes("book")
  ){
    showBooking();
  }

  if(lead.email){
    sendLead();
  }
}

function append(sender,text){
  const box=document.getElementById("chatBox");
  box.innerHTML+=`<p><strong>${sender}:</strong> ${text}</p>`;
  box.scrollTop=box.scrollHeight;
}

function scoreLead(){
  if(
    lead.business?.toLowerCase().includes("plumb") ||
    lead.business?.toLowerCase().includes("hvac") ||
    lead.urgency?.toLowerCase().includes("asap")
  ){
    lead.score="green";
  } else if(lead.urgency?.toLowerCase().includes("exploring")){
    lead.score="red";
  }
}

function showBooking(){
  append("AI","Let’s take a look at your business.");
  document.getElementById("booking").style.display="block";
}

function sendLead(){
  fetch("https://hooks.zapier.com/hooks/catch/XXXX",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      ...lead,
      timestamp:new Date().toISOString()
    })
  });
}
</script>

</body>
</html>
