<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DesertLeap | AI Visibility</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter;
  margin:0;
  background: linear-gradient(135deg, #f9fafb, #eef2f7);
  display:flex;
  justify-content:center;
}

.container {
  max-width:900px;
  width:100%;
  padding:80px 20px;
  text-align:center;
}

h1 {
  font-size:3rem;
  font-weight:800;
  margin-bottom:10px;
}

.sub {
  color:#666;
  margin-bottom:40px;
}

.card {
  background:#fff;
  padding:30px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.08);
  text-align:left;
}

#chatBox {
  height:320px;
  overflow:auto;
  margin-bottom:20px;
  padding-right:10px;
}

.message {
  margin-bottom:12px;
  line-height:1.4;
}

.user {
  font-weight:600;
}

.ai {
  color:#333;
}

.input-row {
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

button {
  padding:14px 22px;
  background:#0FA891;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

button:hover {
  background:#0c8e7a;
}

.badge {
  display:inline-block;
  margin-bottom:15px;
  padding:6px 12px;
  background:#e6f7f4;
  color:#0FA891;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.footer-note {
 margin-top:10px;
  font-size:12px;
  color:#aaa;
  padding-left:4px;
}
</style>
</head>

<body>

<div class="container">

<div class="badge">AI Visibility Tool</div>

<h1>Check Your AI Visibility</h1>
<p class="sub">See if your business is being recommended—or ignored—by AI.</p>

<div class="card">

<div id="chatBox"></div>

<div class="input-row">
<input id="input" placeholder="Type your business or question..." />
<button onclick="send()">Send</button>
</div>

<div id="booking" style="display:none;margin-top:20px;">
<iframe src="https://calendly.com/YOUR-LINK" width="100%" height="500"></iframe>
</div>

<div class="footer-note">
Takes 30 seconds to check. No obligation.
</div>

</div>

</div>

<script>

let lead = {
  messages:[],
  score:"yellow",
  source:"ai_chat"
};

function append(sender, text){
  const box = document.getElementById("chatBox");

  let label = sender ? `<strong>${sender}:</strong> ` : "";

  box.innerHTML += `
    <div class="message">
      <span class="${sender==='You'?'user':'ai'}">
        ${label}${text}
      </span>
    </div>
  `;

  box.scrollTop = box.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const msg = input.value;

  if(!msg) return;

  append("You", msg);
  lead.messages.push(msg);
  input.value="";

  if(msg.includes("@") && !lead.email){
    lead.email = msg;
    append("AI", "Got it — I’ll send results there.");
  }

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg,lead})
  });

  const data = await res.json();

  append("AI", data.reply);

  if(msg.toLowerCase().includes("yes") || msg.toLowerCase().includes("check")){
    showBooking();
  }
}

function showBooking(){
  append("AI","Let’s take a look at your business.");
  document.getElementById("booking").style.display="block";
}

// 🔥 Starter message (makes it feel alive)
append("When someone searches 'best plumber in Phoenix' in ChatGPT, it recommends specific businesses. You either show up—or you don’t. Want me to check yours?");

</script>

</body>
</html>
